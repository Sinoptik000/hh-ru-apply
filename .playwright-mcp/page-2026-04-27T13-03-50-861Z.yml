          - paragraph [ref=e1973]:
            - strong [ref=e1974]: "Привет! Мы - ggsel, маркетплейс цифровых товаров: игр, софта, подписок и многого другого. С 2017 года мы помогаем клиентам находить и покупать всё, что связано с игровым контентом, софтом и цифровыми сервисами. Сегодня ggsel - это топовый маркетплейс СНГ с 5 миллионами посетителей в месяц, 10 тысячами продавцов и 500 тысячами сделок ежемесячно. За последний год мы выросли в 6,5 раз и стремимся стать лидерами цифровой коммерции, а еще выйти на международный уровень. Мы ищем Project Manager в прямое подчинение CEO для запуска новых направлений и продуктов. Это роль с высокой степенью самостоятельности и влияния: от исследования идей до запуска бизнесов с нуля. Эта вакансия для амбициозных и драйвовых специалистов, кто стремится расти быстрее, чем в обычной компании, и готов брать на себя реальное влияние. Формат работы ближе к R&D/стартап-команде - минимум микроменеджмента, максимум ответственности за результат. Роль делится на два блока: Исследование и проверка гипотез (≈20%) Анализ новых рынков и ниш (конкуренты, цены, тренды, игроки). Поиск экспертов и проведение интервью/созвонов. Подготовка материалов и выводов для принятия решений CEO. Поиск возможностей и «неэффективностей» на рынке. 2. Запуск и развитие проектов (≈80%) Полный цикл запуска: от идеи до реализации. Разработка плана запуска и его защита. Координация с внутренними командами (маркетинг, support, юристы и др.). Привлечение ресурсов и управление процессом. Самостоятельное решение задач без постоянного контроля. Ответственность за результат и сроки. Что важно в кандидате Высокая самостоятельность и проактивность. Ориентация на результат, а не на процесс. Драйв и амбиции расти через сложные задачи. Готовность быстро переключаться между разными темами и индустриями. Сильные коммуникационные навыки (внутренние и внешние). Hard skills: Уверенный Excel / работа с данными. Умение быстро разбираться в новых инструментах (например, n8n). Навыки базовой финансовой оценки проектов (CAC, LTV, unit-экономика). Способность структурировать информацию и принимать решения в условиях неопределенности. Опыт в стартапах или консалтинге будет большим плюсом. Рост и развитие возможны в разных направлениях - в зависимости от интересов и сильных сторон. Это может быть движение в сторону управления командой, углубление в развитие отдельного направления или более предпринимательская роль с ответственностью за собственный участок бизнеса. Процесс отбора HR cкрининг Тестовое задание (тестовое не оплачиваем, включает в себя: автогенерация (n8n), Research Bug Bounty). Интервью с CEO. Что предлагаем: Удаленка: работай откуда угодно. Перформанс премия каждые полгода, пересматриваем оклад два раза в год на ревью. Развитие: оплачиваем нужные курсы и конференции - мы заинтересованы в твоем росте. Команду, открытую к идеям - здесь реально можно предлагать, тестировать, внедрять. Тёплую рабочую атмосферу - у нас съезды, командные мероприятия и просто человеческое общение. Реальное влияние на продукт - мы быстро растём, и твои решения напрямую отражаются на бизнесе. Мы создаем комфортные условия, чтобы ты мог сосредоточиться на том, что у тебя получается лучше всего!"
