          - textbox "Текст (правки сохраняются и учитываются при следующей генерации)" [ref=e1942]: "Здравствуйте! Вы ищете Project Manager к CEO для запуска новых направлений и продуктов и хотите обеспечить полный цикл от идеи до реализации с минимумом микроменеджмента и максимумом ответственности за результат. * Project Manager (Middle+) к CEO (R&D / New Business) - руководил запуском бизнес-юнитов с нуля и вывел филиал «Бери Заряд» в Казахстане на самоокупаемость за 6 месяцев. * Уверенный Excel / работа с данными - собираю дашборды и регламенты, которые сокращают временные затраты сейлзов и ускоряют запуски. * Базовая финансовая оценка проектов (CAC, LTV, unit-экономика) - участвовал в создании финансовых планов и pitch deck для Liber.Money и Wata Payments. * Поиск возможностей и анализ неэффективностей на рынке - провожу конкурентные исследования, интервью с экспертами и customer development под новые продукты. * Быстрое внедрение инструментов (например, n8n) - автоматизирую сбор лидов и триггеры в CRM, чтобы команда тратила время на запуск, а не на рутину. Обо мне: Операционный менеджер с опытом в стартапах из IT, SaaS и B2B. Умею структурировать хаос, выстраивать регламенты и запускать процессы, которые растут вместе с бизнесом без раздувания штата. В ggsel вижу возможность влиять на направление с первых шагов: от проверки гипотез до выхода на международный уровень. Ключевые результаты: - Запуск с нуля: вывел филиал в Казахстане, заключил контракты с Magnum, Queen, Almaty Arena и поднял продажи до точки самоокупаемости. - Автоматизация: сократил время на квалификацию лидов на 30% и адаптацию менеджеров в 2 раза через CRM и базы знаний. - Продуктовые запуски: подготовил PRD/TЗ для реферальной программы и подкастов с экспертами в «Огонь», чтобы тестировать новые каналы продаж. Спасибо за уделенное время! Мои контакты: Эдуард Фридман Telegram: https://t.me/EduardFri Email: Fridman.eduard.msk@gmail.com"
